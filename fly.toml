# fly.toml — Rekart OMS
# App name is set during `flyctl apps create`; update the line below after creation.
app = "rekart-oms"
primary_region = "sin"

[build]

[env]
  NODE_ENV = "production"
  PORT     = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source      = "rekart_data"
  destination = "/app/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
